<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="10">
  <title>Onfido Dashboard — Maintenance</title>
  <style>
    body {
      margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f3f4f6; color: #111827;
      display: flex; align-items: center; justify-content: center; height: 100vh;
    }
    .box {
      background: #fff; padding: 2rem 2.5rem; border-radius: 0.5rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; max-width: 400px;
    }
    h2 { margin-top: 0; font-size: 1.25rem; }
    p { color: #6b7280; margin-bottom: 1.5rem; }
    .loader {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid #e5e7eb; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <h2>Onfido Dashboard</h2>
    <p>The dashboard is currently restarting for maintenance.<br>Please wait a moment and the page will refresh automatically.</p>
    <div class="loader"></div>
  </div>
</body>
</html>
